services:
  postgres:
    image: postgres:16
    container_name: gamehub-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-gamehub}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
