spring:
  application:
    name: gamehub
  datasource:
    url: jdbc:postgresql://${DB_HOST:-localhost}:${DB_PORT:-5433}/${DB_NAME:-gamehub}
    username: ${DB_USERNAME:-postgres}
    password: ${DB_PASSWORD:-postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true

gamehub:
  security:
    secret: ${JWT_SECRET}